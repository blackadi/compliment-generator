<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Draco Genesis | Flame-Touched Affirmations</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- External Libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --color-bg: #050101;
            --color-surface: rgba(20, 5, 5, 0.75);
            --color-accent: #ff4d00;
            --color-accent-glow: rgba(255, 77, 0, 0.6);
            --color-gold: #fbbf24;
            --color-text-main: #fee2e2;
            --color-text-dim: #991b1b;
            --color-glass-border: rgba(251, 191, 36, 0.15);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            line-height: 1.5;
        }

        /* 3D Canvas Layer */
        #dragon-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Layer */
        .app-shell {
            width: 100%;
            max-width: min(90vw, 850px);
            z-index: 10;
            padding: 1rem;
            position: relative;
        }

        /* Dragon Scale Texture Border */
        .card-wrapper {
            position: relative;
            padding: 3px;
            border-radius: 28px;
            background: linear-gradient(var(--angle, 0deg), #450a0a, var(--color-accent), var(--color-gold), #450a0a);
            animation: rotate-gradient 6s linear infinite;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.9);
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes rotate-gradient {
            to { --angle: 360deg; }
        }

        .generator-card {
            background: var(--color-surface);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border-radius: 26px;
            padding: clamp(1.5rem, 6vw, 4rem);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            border: 1px solid rgba(251, 191, 36, 0.1);
        }

        /* Dragon Themed Header */
        .header { text-align: center; }
        .header__title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: var(--color-gold);
            font-family: 'Cinzel', serif;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        .header__subtitle {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--color-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Interactive Controls */
        .controls {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .category-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--color-glass-border);
            color: var(--color-gold);
            padding: 0.7rem 1.4rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            transition: all 0.4s var(--ease-out-expo);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .category-btn--active {
            background: var(--color-accent);
            color: white;
            border-color: var(--color-accent);
            box-shadow: 0 0 30px var(--color-accent-glow);
            transform: scale(1.1);
        }

        /* Content Display */
        .display {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .display__text {
            font-size: clamp(1.2rem, 3.8vw, 2rem);
            font-weight: 400;
            max-width: 650px;
            line-height: 1.4;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 77, 0, 0.3);
            transition: all 0.7s var(--ease-out-expo);
        }

        .display__text.changing {
            opacity: 0;
            transform: scale(1.1) rotateY(180deg);
            filter: blur(10px) brightness(3);
        }

        /* Metadata */
        .metadata {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--color-gold);
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid var(--color-gold);
            opacity: 0.7;
        }

        /* Action Buttons */
        .actions { 
            display: grid; 
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem; 
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1.4rem;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s var(--ease-out-expo);
            border: none;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .btn--primary {
            background: linear-gradient(45deg, #7f1d1d, #ef4444);
            color: white;
            box-shadow: 0 10px 40px rgba(153, 27, 27, 0.4);
        }

        .btn--primary:active { transform: translateY(4px); }

        .btn--secondary {
            background: rgba(251, 191, 36, 0.1);
            color: var(--color-gold);
            border: 1px solid var(--color-gold);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--color-gold);
            color: #000;
            padding: 0.8rem 1.8rem;
            border-radius: 4px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transition: 0.5s var(--ease-out-expo);
            z-index: 1000;
        }

        .toast.visible { transform: translateX(-50%) translateY(0); }

        @media (max-width: 640px) {
            .actions { grid-template-columns: 1fr; }
            .generator-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <canvas id="dragon-canvas"></canvas>

    <main class="app-shell">
        <div class="card-wrapper">
            <section class="generator-card">
                <header class="header">
                    <p class="header__title">Ancient Hoard Records</p>
                    <h1 class="header__subtitle">DRACO GENESIS</h1>
                </header>

                <nav class="controls">
                    <button class="category-btn category-btn--active" data-cat="pro">Grand Architect</button>
                    <button class="category-btn" data-cat="humor">Jester</button>
                    <button class="category-btn" data-cat="legend">Mythic Lord</button>
                </nav>

                <div class="display">
                    <blockquote class="display__text" id="display-text">Waking the Beast...</blockquote>
                    
                    <div class="metadata">
                        <div>BLOODLINE: <span id="meta-sync">ELDER</span></div>
                        <div>FURY: <span id="meta-latency">LOW</span></div>
                        <div>SCALE: <span id="meta-node">OBSIDIAN</span></div>
                    </div>
                </div>

                <footer class="actions">
                    <button class="btn btn--primary" id="btn-gen">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                        Incinerate
                    </button>
                    <button class="btn btn--secondary" id="btn-copy">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                    </button>
                </footer>
            </
