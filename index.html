    <style>
        :root {

            --color-accent-glow: rgba(56, 189, 248, 0.4);

            --color-text-dim: #94a3b8;

        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);

            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            line-height: 1.6;

        /* Animated Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);

        .app-shell {
            width: 100%;
            max-width: 850px;
            padding: 2rem;
            z-index: 10;
        }

        /* Animated Border Logic */
        .card-wrapper {
            position: relative;
            padding: 2px;
            border-radius: 20px;
            background: linear-gradient(var(--angle), transparent 50%, var(--color-accent), var(--color-purple), transparent);
            animation: rotate-gradient 6s linear infinite;
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes rotate-gradient {
            to { --angle: 360deg; }
        }

        .generator-card {

            backdrop-filter: blur(25px);

            letter-spacing: 0.5em;
            color: var(--color-accent);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 0.75rem;

            align-items: center;
            justify-content: center;
            gap: 10px;

            font-size: 2.5rem;
            font-weight: 300;
            background: linear-gradient(to right, #fff, var(--color-text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 3.5rem;
        }

        .category-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--color-glass-border);
            color: var(--color-text-dim);
            padding: 0.7rem 1.4rem;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            transition: all 0.3s var(--ease-out-expo);
        }

        .category-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--color-text-main);
            transform: translateY(-2px);
        }

            color: var(--color-bg);
            border-color: var(--color-accent);
            box-shadow: 0 0 20px var(--color-accent-glow);

        .display {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 3rem;
            perspective: 1000px;
        }

        .display__text {
            font-size: 1.85rem;
            font-weight: 400;
            max-width: 650px;
            line-height: 1.4;
            transition: all 0.5s var(--ease-out-expo);
            transform-origin: center;
        }

        .display__text.changing {
            opacity: 0;
            transform: scale(0.95) rotateX(10deg);
            filter: blur(10px);
        }

        .metadata {
            margin-top: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--color-text-dim);
            display: flex;
            gap: 2rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background: rgba(0,0,0,0.2);

        .actions { display: flex; gap: 1rem; justify-content: center; }

        .btn {

            gap: 0.6rem;

            border-radius: 12px;
            font-weight: 600;

            font-size: 0.95rem;

        .btn--primary {

            color: var(--color-text-main);

            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--color-indigo);
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;

            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: 0.5s var(--ease-out-expo);

        // --- 2. THE BACKGROUND ENGINE (Animated Canvas) ---
        class Backdrop {
            constructor() {
                this.canvas = document.getElementById('bg-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.stars = [];
                this.resize();
                this.init();
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            init() {
                for (let i = 0; i < 150; i++) {
                    this.stars.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 2,
                        speed: Math.random() * 0.5 + 0.1,
                        opacity: Math.random()
                    });
                }
            }

            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.stars.forEach(s => {
                    this.ctx.fillStyle = `rgba(56, 189, 248, ${s.opacity})`;
                    this.ctx.beginPath();
                    this.ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    this.ctx.fill();
                    s.y -= s.speed;
                    if (s.y < 0) s.y = this.canvas.height;
                });
                requestAnimationFrame(() => this.draw());
            }
        }

        // --- 3. THE APP LOGIC ---
        class AuroraApp {
            constructor() {
                this.state = { cat: 'pro', busy: false };
                this.nodes = {
                    text: document.getElementById('display-text'),
                    btn: document.getElementById('btn-gen'),
                    copy: document.getElementById('btn-copy'),
                    cats: document.querySelectorAll('.category-btn'),
                    latency: document.getElementById('meta-latency'),
                    cache: document.getElementById('meta-cache'),
                    toast: document.getElementById('toast')
                };
                this.init();
            }

            init() {
                this.nodes.btn.onclick = () => this.generate();
                this.nodes.copy.onclick = () => this.copy();
                this.nodes.cats.forEach(b => {
                    b.onclick = () => {
                        this.nodes.cats.forEach(x => x.classList.remove('category-btn--active'));
                        b.classList.add('category-btn--active');
                        this.state.cat = b.dataset.cat;
                    };
                });
                this.generate(); // Auto-start
            }

            async generate() {
                if (this.state.busy) return;
                this.state.busy = true;
                
                // Animation Out
                this.nodes.text.classList.add('changing');
                
                const start = performance.now();
                await new Promise(r => setTimeout(r, 400 + Math.random() * 400));
                
                const pool = DATABASE[this.state.cat];
                const text = pool[Math.floor(Math.random() * pool.length)];
                
                this.nodes.text.innerText = text;
                this.nodes.text.classList.remove('changing');
                
                this.nodes.latency.innerText = `${Math.round(performance.now() - start)}ms`;
                this.nodes.cache.innerText = Math.random() > 0.5 ? 'HIT' : 'MISS';
                
                this.state.busy = false;
            }

            copy() {
                const text = this.nodes.text.innerText;
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                
                this.nodes.toast.classList.add('visible');
                setTimeout(() => this.nodes.toast.classList.remove('visible'), 2000);
            }
        }
