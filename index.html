<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aurora | Neural Affirmation Engine v3.0</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- External Libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --color-bg: #030712;
            --color-surface: rgba(17, 24, 39, 0.6);
            --color-accent: #38bdf8;
            --color-accent-glow: rgba(56, 189, 248, 0.5);
            --color-purple: #818cf8;
            --color-text-main: #f9fafb;
            --color-text-dim: #9ca3af;
            --color-glass-border: rgba(255, 255, 255, 0.08);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            line-height: 1.5;
            position: relative;
        }

        /* 3D Canvas Layer */
        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Layer */
        .app-shell {
            width: 100%;
            max-width: min(90vw, 900px);
            z-index: 10;
            padding: 1rem;
            position: relative;
        }

        /* Responsive Card Logic */
        .card-wrapper {
            position: relative;
            padding: 1.5px;
            border-radius: 24px;
            background: linear-gradient(var(--angle, 0deg), transparent 30%, var(--color-accent), var(--color-purple), transparent);
            animation: rotate-gradient 8s linear infinite;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes rotate-gradient {
            to { --angle: 360deg; }
        }

        .generator-card {
            background: var(--color-surface);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 23px;
            padding: clamp(1.5rem, 5vw, 4rem);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Header Styles */
        .header { text-align: center; }
        .header__title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--color-accent);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 0.5rem;
            opacity: 0.8;
        }

        .header__subtitle {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 200;
            letter-spacing: -0.02em;
        }

        /* Interactive Controls */
        .controls {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .category-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--color-glass-border);
            color: var(--color-text-dim);
            padding: 0.6rem 1.2rem;
            border-radius: 100px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            transition: all 0.4s var(--ease-out-expo);
            white-space: nowrap;
        }

        .category-btn--active {
            background: var(--color-accent);
            color: var(--color-bg);
            border-color: var(--color-accent);
            box-shadow: 0 0 25px var(--color-accent-glow);
            transform: scale(1.05);
        }

        /* Content Display */
        .display {
            min-height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .display__text {
            font-size: clamp(1.1rem, 3.5vw, 1.75rem);
            font-weight: 300;
            max-width: 600px;
            line-height: 1.4;
            transition: all 0.6s var(--ease-out-expo);
            transform-style: preserve-3d;
        }

        .display__text.changing {
            opacity: 0;
            transform: translateY(20px) rotateX(-15deg);
            filter: blur(15px);
        }

        /* System Metadata */
        .metadata {
            margin-top: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--color-text-dim);
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--color-glass-border);
        }

        .metadata span { color: var(--color-accent); font-weight: 700; }

        /* Action Buttons */
        .actions { 
            display: grid; 
            grid-template-columns: 2fr 1fr;
            gap: 1rem; 
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1.25rem;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s var(--ease-out-expo);
            border: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
            overflow: hidden;
        }

        .btn--primary {
            background: var(--color-accent);
            color: var(--color-bg);
        }

        .btn--primary:active { transform: scale(0.95); }

        .btn--secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--color-text-main);
            border: 1px solid var(--color-glass-border);
        }

        /* Feedback UI */
        .toast {
            position: fixed;
            bottom: calc(2rem + var(--safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--color-purple);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 100px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: 0.5s var(--ease-out-expo);
            z-index: 1000;
        }

        .toast.visible { transform: translateX(-50%) translateY(0); }

        /* Mobile Adaptations */
        @media (max-width: 640px) {
            .actions { grid-template-columns: 1fr; }
            .generator-card { padding: 1.5rem; }
            .category-btn { padding: 0.5rem 1rem; font-size: 0.65rem; }
            .metadata { flex-direction: column; gap: 0.4rem; align-items: center; }
        }
    </style>
</head>

                        Synthesize

                    </button>
                </footer>
            </section>
        </div>
    </main>

        // --- 1. AUDIO ENGINE (Synthesized Sound) ---
        class AudioEngine {
            constructor() {
                this.ctx = null;
            }
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            playBeep(freq = 440, duration = 0.1, type = 'sine') {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            }
            playClick() { this.playBeep(880, 0.05, 'square'); }
            playSuccess() { 
                this.playBeep(440, 0.2); 
                setTimeout(() => this.playBeep(880, 0.2), 50);
            }
        }

        // --- 2. 3D VISUAL ENGINE (Three.js) ---
        class World3D {
            constructor() {
                this.container = document.getElementById('three-canvas');
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ canvas: this.container, antialias: true, alpha: true });
                this.particles = null;
                this.init();
            }

            init() {
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                
                // Particle Cloud
                const geo = new THREE.BufferGeometry();
                const count = 2000;
                const pos = new Float32Array(count * 3);
                for(let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * 10;
                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                
                const mat = new THREE.PointsMaterial({
                    size: 0.015,
                    color: 0x38bdf8,
                    transparent: true,
                    opacity: 0.6,
                    blending: THREE.AdditiveBlending
                });
                
                this.particles = new THREE.Points(geo, mat);
                this.scene.add(this.particles);
                
                this.camera.position.z = 4;
                
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.particles.rotation.y += 0.001;
                this.particles.rotation.x += 0.0005;
                
                // Gentle floating effect
                this.camera.position.x = Math.sin(Date.now() * 0.0005) * 0.2;
                this.camera.position.y = Math.cos(Date.now() * 0.0005) * 0.2;
                this.camera.lookAt(0,0,0);
                
                this.renderer.render(this.scene, this.camera);
            }
        }

        // --- 4. APP CONTROLLER ---
        class AuroraApp {
            constructor() {
                this.audio = new AudioEngine();
                this.state = { cat: 'pro', busy: false };
                this.nodes = {
                    text: document.getElementById('display-text'),
                    btn: document.getElementById('btn-gen'),
                    copy: document.getElementById('btn-copy'),
                    cats: document.querySelectorAll('.category-btn'),
                    latency: document.getElementById('meta-latency'),
                    toast: document.getElementById('toast')
                };
                this.init();
            }

            init() {
                this.nodes.btn.onclick = () => { this.audio.playClick(); this.generate(); };
                this.nodes.copy.onclick = () => { this.audio.playClick(); this.copy(); };
                
                this.nodes.cats.forEach(b => {
                    b.onclick = () => {
                        this.audio.playClick();
                        this.nodes.cats.forEach(x => x.classList.remove('category-btn--active'));
                        b.classList.add('category-btn--active');
                        this.state.cat = b.dataset.cat;
                    };
                });
                
                this.generate();
            }

            async generate() {
                if (this.state.busy) return;
                this.state.busy = true;
                
                this.nodes.text.classList.add('changing');
                
                const start = performance.now();
                await new Promise(r => setTimeout(r, 600));
                
                const pool = DATABASE[this.state.cat];
                const text = pool[Math.floor(Math.random() * pool.length)];
                
                this.nodes.text.innerText = text;
                this.nodes.text.classList.remove('changing');
                
                this.nodes.latency.innerText = `${Math.round(performance.now() - start)}ms`;
                this.state.busy = false;
            }

            copy() {
                const text = this.nodes.text.innerText;
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                
                this.audio.playSuccess();
                this.nodes.toast.classList.add('visible');
                setTimeout(() => this.nodes.toast.classList.remove('visible'), 2500);
            }
        }
